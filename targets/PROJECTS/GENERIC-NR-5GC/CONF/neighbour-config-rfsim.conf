############################################################
#  gNB-to-gNB neighbour list + measurement configuration   #
#  for the 2-cell rfsim setup (gNB_ID 0xe00 & 0xb00)       #
############################################################

neighbour_list = (
  ##########################################################
  #  Entry USED BY gNB_ID = 0xe00  (nr_cellid = 12345678L) #
  ##########################################################
  {
    nr_cellid = 12345678L;                      #  Serving cell of DU0 (gNB 0xe00)
    neighbour_cell_configuration = (
      {
        gNB_ID              = 0xe00;            #  Target DU1 gNB ID
        nr_cellid           = 22222222L;        #  Target DU1 Cell ID
        physical_cellId     = 1;
        absoluteFrequencySSB= 643296;           # change from 621312 to 643296 by anirudh
        subcarrierSpacing   = 1;                # 30 kHz
        band                = 78;
        plmn                = { mcc = 001; mnc = 01; mnc_length = 2 };
        tracking_area_code  = 1;
      }
    );
  },

  ##########################################################
  #  Entry USED BY gNB_ID = 0xe00  (nr_cellid = 22222222L) #
  ##########################################################
  {
    nr_cellid = 22222222L;                           #  Serving cell of DU1 (gNB 0xe00)
    neighbour_cell_configuration = (
      {
        gNB_ID              = 0xe00;            #  Target DU0 gNB ID
        nr_cellid           = 12345678L;          #  Target DU0 Cell ID
        physical_cellId     = 0;
        absoluteFrequencySSB= 630048;		#change from 641280 to 630048 by anirudh
        subcarrierSpacing   = 1;                  # 30 kHz
        band                = 78;
        plmn                = { mcc = 001; mnc = 01; mnc_length = 2 };
        tracking_area_code  = 1;
      }
    );
  }
);

############################################################
#  Common NR measurement-event configuration               #
############################################################

nr_measurement_configuration = {
  Periodical = {
    enable                     = 1;
    includeBeamMeasurements    = 1;
    maxNrofRS_IndexesToReport  = 4;
  };

  A2 = {
    enable        = 1;
    threshold     = 60;
    time_to_trigger = 1;
  };

  A3 = (
    {
      physCellId     = 1;          # neighbour of gNB 0xe00
      offset         = 10;
      hysteresis     = 0;
      time_to_trigger  = 1;
    },
    {
      physCellId     = 0;          # neighbour of gNB 0xb00
      offset         = 5;
      hysteresis     = 1;
      time_to_trigger  = 2;
    }
  );
};

